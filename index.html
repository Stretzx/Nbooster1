<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nbooster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scanline"></div>

<header class="header">
  <div class="header-title">
    <span class="logo-icon">⚡</span>
    <span class="logo-text">NBOOSTER</span>
  </div>
  <div id="shizukuBadge" class="badge badge--checking">
    <span class="badge-dot"></span>
    <span id="shizukuLabel">INIT</span>
  </div>
</header>

<div class="grid-stats">
  <div class="stat-card">
    <div class="stat-label">BATTERY</div>
    <div id="battery" class="stat-value">--</div>
    <div class="stat-bar"><div id="batteryBar" class="stat-bar-fill" style="width:0%"></div></div>
  </div>
  <div class="stat-card">
    <div class="stat-label">RAM</div>
    <div id="ram" class="stat-value">--</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">HZ NOW</div>
    <div id="refreshRate" class="stat-value">--</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">CPU TEMP</div>
    <div id="cpuTemp" class="stat-value">--</div>
  </div>
</div>

<div class="section-label">REFRESH RATE</div>
<div class="card">
  <div class="hz-grid">
    <button class="btn-hz" onclick="setHz(60)"><span class="hz-num">60</span><span class="hz-unit">Hz</span></button>
    <button class="btn-hz" onclick="setHz(90)"><span class="hz-num">90</span><span class="hz-unit">Hz</span></button>
    <button class="btn-hz" onclick="setHz(120)"><span class="hz-num">120</span><span class="hz-unit">Hz</span></button>
    <button class="btn-hz" onclick="setHz(144)"><span class="hz-num">144</span><span class="hz-unit">Hz</span></button>
  </div>
</div>

<div class="section-label">PERFORMANCE</div>
<div class="card">
  <div class="perf-grid">
    <button class="btn-perf btn-green" onclick="setPerfMode('performance')">
      <span class="perf-icon">🚀</span>
      <span>PERFORMANCE</span>
    </button>
    <button class="btn-perf btn-blue" onclick="setPerfMode('balanced')">
      <span class="perf-icon">⚖️</span>
      <span>BALANCED</span>
    </button>
    <button class="btn-perf btn-teal" onclick="setPerfMode('powersave')">
      <span class="perf-icon">🔋</span>
      <span>POWER SAVE</span>
    </button>
  </div>
</div>

<div class="section-label">DISPLAY TWEAKS</div>
<div class="card">
  <div class="tweak-list">
    <button class="btn-tweak" onclick="setFontScale(1.0)">Font Scale → Normal</button>
    <button class="btn-tweak" onclick="setFontScale(0.85)">Font Scale → Small</button>
    <button class="btn-tweak" onclick="toggleAnimations(false)">Kill Animations</button>
    <button class="btn-tweak" onclick="toggleAnimations(true)">Restore Animations</button>
    <button class="btn-tweak" onclick="setDisplaySize(400)">Display Density → Compact</button>
    <button class="btn-tweak" onclick="resetDisplaySize()">Display Density → Reset</button>
  </div>
</div>

<div class="section-label">NETWORK</div>
<div class="card">
  <div class="tweak-list">
    <button class="btn-tweak" onclick="setWifiScan(false)">Disable BG WiFi Scan</button>
    <button class="btn-tweak" onclick="setWifiScan(true)">Enable BG WiFi Scan</button>
    <button class="btn-tweak" onclick="forceMobileData()">Force Mobile Data ON</button>
    <button class="btn-tweak" onclick="resetNetworkPolicy()">Reset Network Policy</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="shizuku.js"></script>
<script src="tweak.js"></script>
<script src="app.js"></script>
</body>
</html>
